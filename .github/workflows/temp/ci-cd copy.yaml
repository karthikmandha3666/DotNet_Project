name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Restore dependencies
      run: dotnet restore ./Backend/Backend.csproj
    - name: Build
      run: dotnet build ./Backend/Backend.csproj --no-restore
    - name: Test
      run: dotnet test ./Backend/Backend.csproj --no-build --verbosity normal
      
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    - name: Build
      working-directory: ./frontend
      run: npm run build

  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    defaults:
      run:
        working-directory: ./infrastructure
    steps:
    - uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform Init
      run: terraform init
    - name: Terraform Plan
      run: terraform plan
      # Add Terraform Apply for CD part if needed

  deploy-to-k8s:
    name: "Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend] # Typically also needs Terraform if provisioning first
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker Images
      run: |
        docker build -t myregistry/backend:${{ github.sha }} ./Backend
        docker build -t myregistry/frontend:${{ github.sha }} ./frontend
        
    # In a real pipeline, you would push these to Azure Container Registry (ACR), AWS ECR, or DockerHub here.
    
    # And you would authenticate to your live Kubernetes cluster here using an action like:
    # - uses: azure/aks-set-context@v3
    #   with:
    #     cluster-name: your-cluster
    #     resource-group: your-rg
    
    - name: Apply Kubernetes Manifests
      run: |
        # Update deployment files with the new dynamic image tags we just built in the previous step
        sed -i "s|image: myregistry/backend:blue|image: myregistry/backend:${{ github.sha }}|g" k8s/backend/deployment-blue.yaml
        sed -i "s|image: myregistry/frontend:blue|image: myregistry/frontend:${{ github.sha }}|g" k8s/frontend/deployment-blue.yaml
        
        # Connect to Kubernetes and apply all the declarative configurations!
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/backend/
        kubectl apply -f k8s/frontend/
        kubectl apply -f k8s/ingress.yaml
