version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=WebProjectDb;User=sa;Password=Your_password123;TrustServerCertificate=True;
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_password123
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
      # Automatically run scripts located in init directory if configured properly, but usually needs a custom entrypoint or manual run.
      # For now, mapping the scripts for manual/tool execution.
      - ./database:/scripts

volumes:
  sqlvolume:
